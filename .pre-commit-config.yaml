---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
      - id: check-json
      - id: pretty-format-json
        args:
            - "--autofix"
            - "--indent=4"
            - "--no-sort-keys"
      - id: detect-private-key
      - id: check-case-conflict
      - id: requirements-txt-fixer
      - id: check-ast
      - id: check-shebang-scripts-are-executable
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-xml
      - id: detect-aws-credentials
      - id: check-docstring-first
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        args: [-I, .codespellignore]
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
  - repo: https://github.com/jackdewinter/pymarkdown
    rev: v0.9.30
    hooks:
      - id: pymarkdown
        args:
          - -d
          - MD013
          - scan
  - repo: https://github.com/tcort/markdown-link-check
    rev: v3.14.2
    hooks:
      - id: markdown-link-check
  - repo: local
    hooks:
      # https://github.com/pre-commit/pre-commit-hooks/issues/683
      # https://github.com/Lucas-C/pre-commit-hooks#forbid--remove-some-unicode-characters
      - id: forbid-unicode-non-breaking-spaces
        name: Detect unicode non-breaking space character U+00A0 aka M-BM-
        language: system
        entry: perl -ne 'print if $m = /\xc2\xa0/; $t ||= $m; END{{exit $t}}'
        files: ""
      - id: remove-unicode-non-breaking-spaces
        name: Remove unicode non-breaking space character U+00A0 aka M-BM-
        language: system
        entry: perl -pi* -e 's/\xc2\xa0/ /g && ($t = 1) && print STDERR $_; END{{exit $t}}'
        files: ""
      - id: forbid-en-dashes
        name: Detect the EXTREMELY confusing unicode character U+2013
        language: system
        entry: perl -ne 'print if $m = /\xe2\x80\x93/; $t ||= $m; END{{exit $t}}'
        files: ""
      - id: remove-en-dashes
        name: Remove the EXTREMELY confusing unicode character U+2013
        language: system
        entry: perl -pi* -e 's/\xe2\x80\x93/-/g && ($t = 1) && print STDERR $_; END{{exit $t}}'
        files: ""
      - id: detect-unicode-private-use-areas
        name: Detect unicode Private Use Areas/Access - Basic Multilingual Plane
        language: system
        entry: perl -ne 'print if $m = /\x[ef][0-9a-f]\x[0-9a-f]{2}/; $t ||= $m; END{{exit $t}}'
        files: ""
      - id: detect-unicode-private-use-areas-15
        name: Detect unicode Private Use Areas/Access - Plane 15
        language: system
        entry: perl -ne 'print if $m = /\x0f\x[0-9a-f]{2}\x[0-9a-f]{2}/; $t ||= $m; END{{exit $t}}'
        files: ""
      - id: detect-unicode-private-use-areas-16
        name: Detect unicode Private Use Areas/Access - Plane 16
        language: system
        entry: perl -ne 'print if $m = /\x10\x[0-9a-f]{2}\x[0-9a-f]{2}/; $t ||= $m; END{{exit $t}}'
        files: ""
